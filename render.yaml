services:
  - type: web
    name: gatekeeper-relay
    env: go
    region: oregon
    plan: free
    buildCommand: go build -ldflags="-s -w" -o gatekeeper-server ./cmd/server
    startCommand: ./gatekeeper-server
    healthCheckPath: /health
    autoDeploy: false   # Deployments controlled by GitHub Actions (render-deploy.yml)
    envVars:
      - key: PORT
        value: 10000
