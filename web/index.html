<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gatekeeper</title>

  <!-- Open Graph / Social Media Preview Tags -->
  <meta property="og:title" content="Gatekeeper | Secure Cloud Relay">
  <meta property="og:description" content="An open-source, End-to-End Encrypted cloud relay server to securely share your local CLI over the web.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gatekeeper.vishalraut.me/">
  <meta property="og:image" content="https://gatekeeper.vishalraut.me/preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
</head>
<body>

<div class="term">

  <!-- ── Top title bar ─────────────────────────────── -->
  <div class="t-bar">
    <div class="t-dots">
      <span class="t-dot r"></span>
      <span class="t-dot y"></span>
      <span class="t-dot g"></span>
    </div>

    <span class="t-title" id="tTitle">gatekeeper</span>
    <span class="t-role" id="tRole">…</span>
  </div>

  <!-- ── Terminal output body ──────────────────────── -->
  <div class="t-body" id="tBody" style="padding: 10px;">
    <div id="terminal-container" style="width: 100%; height: 100%;"></div>
  </div>

  <!-- ── Guest waiting bar ──────────────────────────── -->
  <div class="wait-bar" id="waitBar">
    <span>⏳</span>
    <span id="waitMsg">Waiting for host approval…</span>
  </div>

  <!-- ── Error banner ──────────────────────────────── -->
  <div class="err-banner hidden" id="errBanner">
    <span id="errMsg">Connection failed.</span>
  </div>

  <!-- ── Bottom status bar ─────────────────────────── -->
  <div class="t-foot">
    <span id="footLeft">gatekeeper v2.0</span>
    <span class="f-status" id="footMid"></span>
    <span class="f-right"  id="footRight">share · help</span>
  </div>

</div>



<script src="shell.js"></script>
</body>
</html>
