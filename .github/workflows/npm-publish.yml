name: Publish to npm

on:
  # Triggered automatically by the release workflow
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish — must match GitHub Release tag (e.g. v2.0.1)'
        required: true

permissions:
  contents: write
  id-token: write   # required for npm provenance (bypasses OTP/2FA)

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Strip the leading 'v' from the tag (v2.0.1 → 2.0.1) and bump package.json + cmd/server/main.go
      - name: Set package version
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          VERSION="${RAW_VERSION#v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version
          sed -i "s/\"version\":     \"[0-9.]*\"/\"version\":     \"$VERSION\"/g" cmd/server/main.go

      # Validate package before publishing
      - name: Dry-run check
        run: npm pack --dry-run

      - name: Publish to npm
        # --provenance: attaches a signed OIDC attestation proving this package
        # came from this GitHub Actions run — bypasses 2FA/OTP requirement
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and push version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json cmd/server/main.go
          git commit -m "chore: bump version to ${{ github.event.inputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`gatekeeper-shell@${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Install:** \`npx gatekeeper-shell\`" >> $GITHUB_STEP_SUMMARY
          echo "**Provenance:** This release is signed and verifiable on npm" >> $GITHUB_STEP_SUMMARY
